<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Shiftable</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style id="navStyles"></style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;color:#0f172a;font-family:'Manrope',sans-serif;}
.page-hero{background:#0f172a;padding:3.5rem 2rem;text-align:center;}
.page-hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.75rem,4vw,2.5rem);font-weight:700;color:#fff;margin-bottom:.5rem;}
.page-hero p{color:#94a3b8;font-size:.95rem;max-width:480px;margin:0 auto;}
.wrap{max-width:900px;margin:0 auto;padding:2.5rem 2rem;}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
.bcard{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;cursor:pointer;transition:box-shadow .25s,transform .25s,border-color .25s;}
.bcard:hover{box-shadow:0 10px 32px rgba(0,0,0,.1);transform:translateY(-3px);border-color:#38bdf8;}
.bcard-img{height:180px;background:linear-gradient(135deg,#0f172a,#0f2040);overflow:hidden;}
.bcard-img img{width:100%;height:100%;object-fit:cover;}
.bcard-body{padding:1.25rem;}
.bcard-date{font-size:.72rem;color:#94a3b8;margin-bottom:.5rem;font-family:'DM Mono',monospace;}
.bcard-title{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:#0f172a;margin-bottom:.5rem;line-height:1.3;}
.bcard-excerpt{font-size:.82rem;color:#64748b;line-height:1.6;}
.empty{text-align:center;padding:4rem;color:#64748b;grid-column:1/-1;}

/* SINGLE POST */
.post-wrap{max-width:720px;margin:0 auto;padding:2.5rem 2rem;}
.post-cover{width:100%;height:320px;object-fit:cover;border-radius:16px;margin-bottom:2rem;}
.post-meta{font-size:.78rem;color:#94a3b8;margin-bottom:.75rem;}
.post-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.5rem,3.5vw,2.25rem);font-weight:700;color:#0f172a;margin-bottom:1.5rem;line-height:1.2;}
.post-content{font-size:.95rem;color:#334155;line-height:1.85;white-space:pre-wrap;}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;color:#38bdf8;font-size:.85rem;font-weight:600;cursor:pointer;margin-bottom:1.5rem;text-decoration:none;}
.back-btn:hover{color:#0ea5e9;}
</style>
</head>
<body>
<div id="navMount"></div>

<div id="listView">
  <div class="page-hero">
    <h1>Shiftable <span style="color:#38bdf8;">Blog</span></h1>
    <p>Insights on AI tools, automation, and how businesses are making the shift.</p>
  </div>
  <div class="wrap">
    <div class="blog-grid" id="blogGrid"><div class="empty">Loading posts...</div></div>
  </div>
</div>

<div id="postView" style="display:none;">
  <div class="post-wrap">
    <a class="back-btn" onclick="showList()">← Back to Blog</a>
    <div id="postContent"></div>
  </div>
</div>

<script>
async function init() {
  document.getElementById('navStyles').textContent = NAV_CSS;
  const { data: { session } } = await sb.auth.getSession();
  const user = session?.user || null;
  const profile = user ? await getProfile(user.id) : null;
  document.getElementById('navMount').innerHTML = buildNav(user, profile);
  if (user) updateCartCount();

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('post');
  if (slug) {
    await showPost(slug);
  } else {
    await loadPosts();
  }
}

async function loadPosts() {
  const { data: posts } = await sb.from('blog_posts')
    .select('id, title, slug, excerpt, cover_image, created_at')
    .eq('published', true)
    .order('created_at', { ascending: false });
  const grid = document.getElementById('blogGrid');
  grid.innerHTML = (posts || []).length ? posts.map(p => `
    <div class="bcard" onclick="showPost('${p.slug}')">
      <div class="bcard-img">${p.cover_image ? `<img src="${p.cover_image}" alt="${p.title}" loading="lazy">` : ''}</div>
      <div class="bcard-body">
        <div class="bcard-date">${new Date(p.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
        <div class="bcard-title">${p.title}</div>
        <div class="bcard-excerpt">${p.excerpt || ''}</div>
      </div>
    </div>`).join('') : '<div class="empty">No posts yet. Check back soon.</div>';
}

async function showPost(slug) {
  const { data: post } = await sb.from('blog_posts')
    .select('*').eq('slug', slug).eq('published', true).single();
  if (!post) { showList(); return; }
  document.title = post.title + ' — Shiftable Blog';
  document.getElementById('postContent').innerHTML = `
    ${post.cover_image ? `<img src="${post.cover_image}" alt="${post.title}" class="post-cover">` : ''}
    <div class="post-meta">${new Date(post.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
    <h1 class="post-title">${post.title}</h1>
    <div class="post-content">${post.content}</div>
  `;
  document.getElementById('listView').style.display = 'none';
  document.getElementById('postView').style.display = 'block';
  window.history.pushState({}, '', `blog.html?post=${slug}`);
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('postView').style.display = 'none';
  document.title = 'Blog — Shiftable';
  window.history.pushState({}, '', 'blog.html');
}

init();
</script>
</body>
</html>
