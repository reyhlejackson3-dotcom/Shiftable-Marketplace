<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace — Shiftable</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style id="navStyles"></style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;color:#0f172a;font-family:'Manrope',sans-serif;}
.page-header{background:#0f172a;padding:1.75rem 2rem;color:#fff;}
.page-header h1{font-family:'League Spartan',sans-serif;font-size:1.75rem;font-weight:800;margin-bottom:.25rem;}
.page-header p{color:#94a3b8;font-size:.88rem;}
.layout{max-width:1280px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:240px 1fr;gap:2rem;}
@media(max-width:768px){.layout{grid-template-columns:1fr;}}

/* SIDEBAR */
.sidebar{background:#fff;border:1px solid #e2e8f0;padding:1.5rem;height:fit-content;}
.sidebar h3{font-family:'League Spartan',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #e2e8f0;}
.filter-group{margin-bottom:1.5rem;}
.filter-group label.group-label{display:block;font-size:.68rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem;}
.filter-check{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;cursor:pointer;user-select:none;}
.filter-check input{accent-color:#38bdf8;}
.filter-check span{font-size:.85rem;color:#475569;}
.price-row{display:flex;gap:.5rem;align-items:center;}
.price-row input{flex:1;border:1.5px solid #e2e8f0;padding:.4rem .6rem;font-size:.82rem;outline:none;font-family:'Manrope',sans-serif;}
.price-row input:focus{border-color:#38bdf8;}
.price-row span{font-size:.78rem;color:#94a3b8;}
.apply-btn{width:100%;background:#38bdf8;color:#fff;border:none;padding:.6rem;font-size:.85rem;font-weight:600;cursor:pointer;margin-top:1rem;font-family:'Manrope',sans-serif;}
.apply-btn:hover{background:#0ea5e9;}

/* PRODUCTS */
.sort-bar{background:#fff;border:1px solid #e2e8f0;padding:.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.sort-bar span{font-size:.85rem;color:#475569;}
.sort-select{border:1.5px solid #e2e8f0;padding:.35rem .75rem;font-size:.85rem;outline:none;font-family:'Manrope',sans-serif;}
.sort-select:focus{border-color:#38bdf8;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;}
.pcard{background:#fff;border:1px solid #e2e8f0;transition:box-shadow .2s,border-color .2s;display:flex;flex-direction:column;}
.pcard:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);border-color:#38bdf8;}
.pc-img{height:150px;overflow:hidden;position:relative;background:#f0f9ff;flex-shrink:0;}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.pcard:hover .pc-img img{transform:scale(1.04);}
.pc-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);}
.pc-placeholder svg{width:40px;height:40px;color:#94a3b8;}
.pc-badge{position:absolute;top:.5rem;left:.5rem;font-size:.6rem;font-weight:700;padding:2px 8px;}
.pc-badge.original{color:#ea580c;background:#ffedd5;}
.pc-badge.verified{color:#0284c7;background:#e0f2fe;}
.pc-body{padding:1rem;flex:1;display:flex;flex-direction:column;}
.pc-name{font-family:'League Spartan',sans-serif;font-size:.92rem;font-weight:700;color:#0f172a;margin-bottom:.2rem;}
.pc-seller{font-size:.72rem;color:#38bdf8;margin-bottom:.4rem;font-weight:600;}
.pc-desc{font-size:.78rem;color:#64748b;line-height:1.55;margin-bottom:.75rem;flex:1;}
.pc-price{font-family:'League Spartan',sans-serif;font-size:1.2rem;font-weight:800;}
.pc-per{font-size:.7rem;color:#64748b;margin-bottom:.65rem;}
.pc-actions{display:flex;gap:.4rem;}
.pc-cart{flex:1;background:#38bdf8;color:#fff;border:none;padding:.5rem;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;transition:background .2s;}
.pc-cart:hover{background:#0ea5e9;}
.pc-view{background:transparent;color:#475569;border:1.5px solid #e2e8f0;padding:.5rem .65rem;font-size:.78rem;cursor:pointer;font-family:'Manrope',sans-serif;transition:all .2s;}
.pc-view:hover{border-color:#38bdf8;color:#38bdf8;}
.empty{text-align:center;padding:4rem;color:#64748b;grid-column:1/-1;}
</style>
</head>
<body>
<div id="navMount"></div>

<div class="page-header">
  <h1>AI Marketplace</h1>
  <p>Browse all verified AI systems from Shiftable and independent sellers</p>
</div>

<div class="layout">
  <aside class="sidebar">
    <h3>Filter</h3>

    <div class="filter-group">
      <label class="group-label">By Business Function</label>
      <div style="max-height:220px;overflow-y:auto;padding-right:.25rem;">
        <label class="filter-check"><input type="checkbox" value="customer-support" onchange="applyFilters()"><span>Customer Support</span></label>
        <label class="filter-check"><input type="checkbox" value="sales-crm" onchange="applyFilters()"><span>Sales & CRM</span></label>
        <label class="filter-check"><input type="checkbox" value="marketing" onchange="applyFilters()"><span>Marketing & Advertising</span></label>
        <label class="filter-check"><input type="checkbox" value="finance" onchange="applyFilters()"><span>Finance & Accounting</span></label>
        <label class="filter-check"><input type="checkbox" value="hr-recruiting" onchange="applyFilters()"><span>HR & Recruiting</span></label>
        <label class="filter-check"><input type="checkbox" value="project-management" onchange="applyFilters()"><span>Project Management</span></label>
        <label class="filter-check"><input type="checkbox" value="analytics" onchange="applyFilters()"><span>Data & Analytics</span></label>
        <label class="filter-check"><input type="checkbox" value="legal-compliance" onchange="applyFilters()"><span>Legal & Compliance</span></label>
        <label class="filter-check"><input type="checkbox" value="operations" onchange="applyFilters()"><span>Operations</span></label>
        <label class="filter-check"><input type="checkbox" value="ecommerce" onchange="applyFilters()"><span>E-Commerce</span></label>
      </div>
    </div>

    <div class="filter-group">
      <label class="group-label">By AI Type</label>
      <div style="max-height:220px;overflow-y:auto;padding-right:.25rem;">
        <label class="filter-check"><input type="checkbox" value="agents-bots" onchange="applyFilters()"><span>AI Agents & Bots</span></label>
        <label class="filter-check"><input type="checkbox" value="automation" onchange="applyFilters()"><span>Automation & Workflows</span></label>
        <label class="filter-check"><input type="checkbox" value="content-generation" onchange="applyFilters()"><span>Content Generation</span></label>
        <label class="filter-check"><input type="checkbox" value="voice-phone" onchange="applyFilters()"><span>Voice & Phone AI</span></label>
        <label class="filter-check"><input type="checkbox" value="image-video" onchange="applyFilters()"><span>Image & Video AI</span></label>
        <label class="filter-check"><input type="checkbox" value="data-scraping" onchange="applyFilters()"><span>Data Extraction & Scraping</span></label>
        <label class="filter-check"><input type="checkbox" value="coding-dev" onchange="applyFilters()"><span>Coding & Development</span></label>
        <label class="filter-check"><input type="checkbox" value="research" onchange="applyFilters()"><span>Research & Intelligence</span></label>
        <label class="filter-check"><input type="checkbox" value="scheduling" onchange="applyFilters()"><span>Scheduling & Booking</span></label>
        <label class="filter-check"><input type="checkbox" value="document-processing" onchange="applyFilters()"><span>Document Processing</span></label>
      </div>
    </div>
    <div class="filter-group">
      <label class="group-label">Source</label>
      <label class="filter-check"><input type="checkbox" id="filterOriginal" onchange="applyFilters()"><span>Shiftable Originals</span></label>
      <label class="filter-check"><input type="checkbox" id="filterThirdParty" onchange="applyFilters()"><span>Third Party</span></label>
    </div>
    <div class="filter-group">
      <label class="group-label">Price Range</label>
      <div class="price-row">
        <input type="number" id="priceMin" placeholder="Min">
        <span>—</span>
        <input type="number" id="priceMax" placeholder="Max">
      </div>
      <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
    </div>
  </aside>

  <div>
    <div class="sort-bar">
      <span id="resultCount">Loading...</span>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="newest">Newest First</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="name">Name A–Z</option>
      </select>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>

<div style="background:#0f172a;padding:1.5rem 2rem;text-align:center;margin-top:2rem;">
  <span style="font-family:'League Spartan',sans-serif;font-size:.88rem;color:#94a3b8;margin-right:1rem;">Are you an AI builder?</span>
  <a href="get-verified.html" style="background:linear-gradient(135deg,#0284c7,#38bdf8);color:#fff;padding:.55rem 1.25rem;font-size:.82rem;font-weight:700;text-decoration:none;font-family:'Manrope',sans-serif;margin-right:.75rem;">Apply for Shiftable Verified →</a>
  <a href="auth.html?tab=signup&type=seller" style="color:#94a3b8;font-size:.82rem;text-decoration:none;">or create a seller account</a>
</div>

<script>
let allProducts = [];

async function init() {
  document.getElementById('navStyles').textContent = NAV_CSS;
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q') || '';
  const cat = params.get('cat') || '';
  if (q) { /* inject into search handled below */ }
  if (cat) {
    document.querySelectorAll('.filter-check input[value]').forEach(cb => { if (cb.value === cat) cb.checked = true; });
  }

  const { data: { session } } = await sb.auth.getSession();
  const user = session?.user || null;
  const profile = user ? await getProfile(user.id) : null;
  document.getElementById('navMount').innerHTML = buildNav(user, profile);
  if (user) updateCartCount();

  const { data } = await sb.from('products').select('*, profiles(full_name)').eq('status','approved');
  allProducts = data || [];

  // Apply URL query
  if (q) {
    const input = document.getElementById('navSearchInput');
    if (input) input.value = q;
  }

  applyFilters();
}

function applyFilters() {
  const searchEl = document.getElementById('navSearchInput');
  const q = (searchEl ? searchEl.value : '').toLowerCase();
  const checkedCats = [...document.querySelectorAll('.filter-check input[value]:checked')].map(c => c.value);
  const filterOriginal = document.getElementById('filterOriginal').checked;
  const filterThirdParty = document.getElementById('filterThirdParty').checked;
  const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
  const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
  const sort = document.getElementById('sortSelect').value;

  let filtered = allProducts.filter(p => {
    const matchQ = !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
    const matchCat = !checkedCats.length || checkedCats.some(c => p.category && p.category.includes(c));
    const matchSrc = (!filterOriginal && !filterThirdParty) || (filterOriginal && p.is_shiftable_original) || (filterThirdParty && !p.is_shiftable_original);
    const matchPrice = p.price >= priceMin && p.price <= priceMax;
    return matchQ && matchCat && matchSrc && matchPrice;
  });

  if (sort === 'price-low') filtered.sort((a,b) => a.price - b.price);
  else if (sort === 'price-high') filtered.sort((a,b) => b.price - a.price);
  else if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
  else filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  document.getElementById('resultCount').textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`;
  renderProducts(filtered);
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  if (!products.length) { grid.innerHTML = `<div class="empty">No products match your filters</div>`; return; }
  grid.innerHTML = products.map(p => {
    const isSystem = p.is_shiftable_original;
    const dest = p.affiliate_link || p.product_website || '#';
    const priceBlock = isSystem
      ? `<div class="pc-price">$${p.price}</div><div class="pc-per">/${p.price_type}</div>`
      : `<div class="pc-price" style="font-size:.92rem;color:#38bdf8;">View on site →</div>`;
    const actions = isSystem
      ? `<button class="pc-cart" onclick="event.stopPropagation();addToCart('${p.id}')">Add to Cart</button>
         <button class="pc-view" onclick="event.stopPropagation();window.location.href='product.html?id=${p.id}'">View</button>`
      : `<button class="pc-cart" onclick="event.stopPropagation();trackAndVisit('${p.id}','${dest}')">Visit Site →</button>
         <button class="pc-view" onclick="event.stopPropagation();window.location.href='product.html?id=${p.id}'">Details</button>`;
    return `
    <div class="pcard" onclick="window.location.href='product.html?id=${p.id}'" style="cursor:pointer;">
      <div class="pc-img">
        ${p.photo_url
          ? `<img src="${p.photo_url}" alt="${p.name}" loading="lazy">`
          : `<div class="pc-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>`}
${(p.is_shiftable_verified || p.is_shiftable_original) ? `<span class="sv-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>Shiftable Verified</span>` : ''}
      </div>
      <div class="pc-body">
        <div class="pc-name">${p.name}</div>
        <div class="pc-seller">${isSystem ? 'by Shiftable Systems' : 'by ' + (p.profiles?.full_name || 'Seller')}</div>
        <div class="pc-desc">${(p.description||'').substring(0,90)}${(p.description||'').length > 90 ? '...' : ''}</div>
        ${priceBlock}
        <div class="pc-actions">
          ${actions}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function trackAndVisit(productId, url) {
  try {
    const { data: p } = await sb.from('products').select('click_count').eq('id', productId).single();
    await sb.from('products').update({ click_count: (p?.click_count || 0) + 1 }).eq('id', productId);
    await sb.from('product_clicks').insert({ product_id: productId });
  } catch(e) {}
  window.open(url, '_blank', 'noopener');
}

init();
</script>
</body>
</html>
