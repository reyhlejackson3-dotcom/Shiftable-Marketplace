<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Shiftable</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;color:#0f172a;font-family:'Manrope',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:space-between;padding:.75rem 2rem;background:#0f172a;}
nav img{height:46px;width:auto;}
nav a.back{font-size:.82rem;color:#94a3b8;text-decoration:none;}
nav a.back:hover{color:#fff;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:#fff;border:1px solid #e2e8f0;width:100%;max-width:440px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.top{background:#0f172a;padding:2.25rem 2rem;text-align:center;}
.slogan{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.2em;color:#38bdf8;text-transform:uppercase;margin-bottom:1rem;}
.top h1{font-family:'League Spartan',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:.25rem;}
.top p{font-size:.82rem;color:#94a3b8;}
.body{padding:2rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.72rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem;}
.field input{width:100%;border:1.5px solid #e2e8f0;padding:.65rem .9rem;font-size:.9rem;outline:none;font-family:'Manrope',sans-serif;color:#0f172a;transition:border-color .2s;}
.field input:focus{border-color:#38bdf8;}
.submit-btn{width:100%;background:#38bdf8;color:#fff;border:none;padding:.9rem;font-family:'Manrope',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;}
.submit-btn:hover{background:#0ea5e9;}
.msg{font-size:.82rem;margin-top:.85rem;padding:.6rem .8rem;display:none;}
.msg.error{display:block;background:#fef2f2;color:#dc2626;border-left:3px solid #dc2626;}
.msg.success{display:block;background:#f0fdf4;color:#16a34a;border-left:3px solid #16a34a;}
.msg.info{display:block;background:#f0f9ff;color:#0284c7;border-left:3px solid #38bdf8;}
</style>
</head>
<body>
<nav>
  <a href="index.html"><img src="logo.png" alt="Shiftable"></a>
  <a href="auth.html" class="back">← Back to Log In</a>
</nav>

<div class="wrap">
  <div class="card">
    <div class="top">
      <div class="slogan">Make the Shift</div>
      <h1>Set a New Password</h1>
      <p>Enter a new password for your account</p>
    </div>
    <div class="body">
      <div class="field"><label>New Password</label><input type="password" id="newPass" placeholder="Min 8 characters"></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="confirmPass" placeholder="Re-enter password" onkeydown="if(event.key==='Enter')updatePassword()"></div>
      <button class="submit-btn" onclick="updatePassword()">Update Password →</button>
      <div id="msg" class="msg"></div>
    </div>
  </div>
</div>

<script>
let hasSession = false;

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
}

// When arriving from the email link, Supabase sets a recovery session automatically.
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || session) hasSession = true;
});

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) hasSession = true;
  else showMsg('Open this page from the reset link in your email.', 'info');
})();

async function updatePassword() {
  const pass = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  if (!pass || pass.length < 8) { showMsg('Password must be at least 8 characters', 'error'); return; }
  if (pass !== confirm) { showMsg('Passwords do not match', 'error'); return; }
  if (!hasSession) { showMsg('Reset link expired or invalid. Request a new one from the login page.', 'error'); return; }
  showMsg('Updating...', 'info');
  const { error } = await sb.auth.updateUser({ password: pass });
  if (error) { showMsg(error.message, 'error'); return; }
  showMsg('Password updated! Redirecting to login...', 'success');
  setTimeout(() => { window.location.href = 'auth.html'; }, 1500);
}
</script>
</body>
</html>
