<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Shiftable</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style id="navStyles"></style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;color:#0f172a;font-family:'Manrope',sans-serif;}

.breadcrumb{background:#fff;border-bottom:1px solid #e2e8f0;padding:.6rem 2rem;}
.breadcrumb a{font-size:.8rem;color:#64748b;text-decoration:none;}
.breadcrumb a:hover{color:#38bdf8;}
.breadcrumb span{font-size:.8rem;color:#94a3b8;margin:0 .35rem;}

.main{max-width:1200px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:1fr 360px;gap:2rem;align-items:start;}
@media(max-width:900px){.main{grid-template-columns:1fr;}}

/* PRODUCT LEFT */
.prod-img-wrap{background:#fff;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:1.5rem;}
.prod-img{height:340px;}
.prod-img img{width:100%;height:100%;object-fit:cover;display:block;}
.prod-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);}
.prod-img-placeholder svg{width:64px;height:64px;color:#94a3b8;}

.prod-info{background:#fff;border:1px solid #e2e8f0;padding:2rem;margin-bottom:1.5rem;}
.prod-badges{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem;}
.prod-badge{font-size:.65rem;font-weight:700;padding:3px 10px;}
.pb-original{color:#ea580c;background:#ffedd5;}
.pb-verified{color:#0284c7;background:#e0f2fe;}
.pb-cat{color:#64748b;background:#f1f5f9;}
.prod-name{font-family:'League Spartan',sans-serif;font-size:2rem;font-weight:800;margin-bottom:.35rem;letter-spacing:-.02em;line-height:1.2;}
.prod-seller{font-size:.85rem;color:#64748b;margin-bottom:1rem;}
.prod-seller a{color:#38bdf8;font-weight:600;text-decoration:none;}
.prod-desc{font-size:.95rem;color:#475569;line-height:1.75;}

.prod-feats{background:#fff;border:1px solid #e2e8f0;padding:1.75rem;}
.prod-feats h3{font-family:'League Spartan',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #e2e8f0;}
.feat-list{display:flex;flex-direction:column;gap:.6rem;}
.feat-item{display:flex;align-items:flex-start;gap:.75rem;font-size:.9rem;color:#475569;line-height:1.45;}
.feat-check{width:18px;height:18px;background:#38bdf8;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.feat-check::after{content:'✓';color:#fff;font-size:.6rem;font-weight:700;}

/* BUY BOX */
.buy-box{background:#fff;border:1px solid #e2e8f0;padding:1.75rem;position:sticky;top:80px;}
.bb-price{font-family:'League Spartan',sans-serif;font-size:2.5rem;font-weight:800;color:#0f172a;line-height:1;margin-bottom:.2rem;}
.bb-per{font-size:.82rem;color:#64748b;margin-bottom:.75rem;}
.bb-note{font-size:.8rem;color:#16a34a;font-weight:600;margin-bottom:1.25rem;display:flex;align-items:center;gap:.4rem;}
.bb-divider{height:1px;background:#e2e8f0;margin-bottom:1.25rem;}
.bb-cart{width:100%;background:#38bdf8;color:#fff;border:none;padding:1rem;font-family:'Manrope',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-bottom:.75rem;}
.bb-cart:hover{background:#0ea5e9;}
.bb-meta{margin-top:1.25rem;}
.bb-row{display:flex;justify-content:space-between;font-size:.82rem;padding:.4rem 0;border-bottom:1px solid #f1f5f9;}
.bb-row:last-child{border:none;}
.bb-key{color:#64748b;}
.bb-val{font-weight:600;color:#0f172a;}

.seller-card{background:#fff;border:1px solid #e2e8f0;padding:1.5rem;margin-top:1rem;}
.seller-card h4{font-family:'League Spartan',sans-serif;font-size:.88rem;font-weight:700;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid #e2e8f0;}
.seller-av{width:44px;height:44px;background:linear-gradient(135deg,#38bdf8,#0284c7);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'League Spartan',sans-serif;font-weight:800;color:#fff;font-size:1rem;margin-bottom:.6rem;}
.seller-nm{font-weight:700;font-size:.9rem;margin-bottom:.2rem;}
.seller-type{font-size:.68rem;color:#38bdf8;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;}

.loading{text-align:center;padding:5rem;color:#64748b;}
</style>
</head>
<body>
<div id="navMount"></div>

<div class="breadcrumb">
  <a href="index.html">Home</a><span>›</span>
  <a href="marketplace.html">Marketplace</a><span>›</span>
  <span id="breadcrumbName">Loading...</span>
</div>

<div id="loadingState" class="loading">Loading product...</div>

<div class="main" id="productContent" style="display:none;">
  <div>
    <div class="prod-img-wrap">
      <div class="prod-img" id="prodImg"></div>
    </div>
    <div class="prod-info">
      <div class="prod-badges" id="prodBadges"></div>
      <div class="prod-name" id="prodName"></div>
      <div class="prod-seller" id="prodSeller"></div>
      <div class="prod-desc" id="prodDesc"></div>
    </div>
    <div class="prod-feats">
      <h3>What's Included</h3>
      <div class="feat-list" id="prodFeats"></div>
    </div>
  </div>

  <div>
    <div class="buy-box">
      <div class="bb-price" id="bbPrice"></div>
      <div class="bb-per" id="bbPer"></div>
      <div class="bb-note" id="bbNote">✓ Setup included in first month</div>
      <div class="bb-divider"></div>
      <button class="bb-cart" id="cartBtn">Add to Cart</button>
      <div class="bb-meta" id="bbMeta">
        <div class="bb-row"><span class="bb-key">Setup Fee</span><span class="bb-val">Included</span></div>
        <div class="bb-row"><span class="bb-key">Billing</span><span class="bb-val" id="bbBilling">Monthly</span></div>
        <div class="bb-row"><span class="bb-key">Implementation</span><span class="bb-val">3–5 business days</span></div>
        <div class="bb-row"><span class="bb-key">Sold by</span><span class="bb-val" id="bbSeller"></span></div>
      </div>
    </div>
    <div class="seller-card">
      <h4>About the Seller</h4>
      <div class="seller-av" id="sellerAv"></div>
      <div class="seller-nm" id="sellerNm"></div>
      <div class="seller-type" id="sellerType"></div>
    </div>
  </div>
</div>

<script>
async function init() {
  document.getElementById('navStyles').textContent = NAV_CSS;
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { window.location.href = 'marketplace.html'; return; }

  const { data: { session } } = await sb.auth.getSession();
  const user = session?.user || null;
  const profile = user ? await getProfile(user.id) : null;
  document.getElementById('navMount').innerHTML = buildNav(user, profile);
  if (user) updateCartCount();

  const { data: p } = await sb.from('products').select('*, profiles(full_name, account_type)').eq('id', id).single();
  if (!p) { window.location.href = 'marketplace.html'; return; }

  document.title = p.name + ' — Shiftable';
  document.getElementById('breadcrumbName').textContent = p.name;

  // Photo
  document.getElementById('prodImg').innerHTML = p.photo_url
    ? `<img src="${p.photo_url}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;">`
    : `<div class="prod-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>`;

  const sellerName = p.is_shiftable_original ? 'Shiftable Systems' : (p.profiles?.full_name || 'Seller');

  document.getElementById('prodBadges').innerHTML = `
    ${p.is_shiftable_original ? '<span class="prod-badge pb-original">Shiftable Original</span>' : ''}
    ${(p.is_shiftable_verified && !p.is_shiftable_original) ? '<span class="prod-badge pb-verified">Shiftable Verified</span>' : ''}
    ${(p.category || []).map(c => `<span class="prod-badge pb-cat">${c}</span>`).join('')}
  `;
  document.getElementById('prodName').textContent = p.name;
  document.getElementById('prodSeller').innerHTML = `Sold by <a>${sellerName}</a>`;
  document.getElementById('prodDesc').textContent = p.description || '';
  document.getElementById('prodFeats').innerHTML = (p.features || []).map(f => `
    <div class="feat-item"><div class="feat-check"></div>${f}</div>
  `).join('');

  const initials = sellerName.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('sellerAv').textContent = initials;
  document.getElementById('sellerNm').textContent = sellerName;
  document.getElementById('sellerType').textContent = p.is_shiftable_original ? 'Shiftable Original Creator' : 'Independent Seller';

  const cartBtn = document.getElementById('cartBtn');

  if (p.is_shiftable_original) {
    // Shiftable Systems — full cart/checkout flow
    document.getElementById('bbPrice').textContent = '$' + p.price;
    document.getElementById('bbPer').textContent = '/' + p.price_type;
    document.getElementById('bbBilling').textContent = p.price_type === 'month' ? 'Monthly subscription' : 'One-time payment';
    document.getElementById('bbSeller').textContent = sellerName;
    cartBtn.textContent = 'Add to Cart';
    cartBtn.onclick = () => addToCart(p.id);
  } else {
    // Third-party affiliate product — redirect out to seller's site
    document.getElementById('bbPrice').style.display = 'none';
    document.getElementById('bbPer').style.display = 'none';
    document.getElementById('bbNote').textContent = '✓ Available directly from the seller';
    document.getElementById('bbMeta').innerHTML = `
      <div class="bb-row"><span class="bb-key">Sold by</span><span class="bb-val">${sellerName}</span></div>
      <div class="bb-row"><span class="bb-key">Where</span><span class="bb-val">External site</span></div>
    `;
    const dest = p.affiliate_link || p.product_website || '#';
    cartBtn.textContent = 'Visit Site →';
    cartBtn.onclick = async () => {
      // Track the click
      try {
        await sb.from('products').update({ click_count: (p.click_count || 0) + 1 }).eq('id', p.id);
        await sb.from('product_clicks').insert({ product_id: p.id });
      } catch(e) {}
      window.open(dest, '_blank', 'noopener');
    };
  }

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('productContent').style.display = 'grid';
}

init();
</script>
</body>
</html>
