<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Profile — Shiftable</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style id="navStyles"></style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;color:#0f172a;font-family:'Manrope',sans-serif;}
.cover{background:linear-gradient(135deg,#0b1120,#0f2040,#0b1120);height:160px;}
.wrap{max-width:1000px;margin:0 auto;padding:0 2rem 3rem;}
.profile-head{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:1.75rem;margin-top:-70px;position:relative;display:flex;gap:1.5rem;align-items:flex-end;flex-wrap:wrap;}
.ph-avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#0284c7);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'League Spartan',sans-serif;font-weight:800;font-size:2.75rem;overflow:hidden;background-size:cover;background-position:center;border:4px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,.1);flex-shrink:0;}
.ph-info{flex:1;min-width:200px;}
.ph-name{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:#0f172a;margin-bottom:.3rem;}
.ph-desc{font-size:.9rem;color:#64748b;line-height:1.6;margin-bottom:.75rem;max-width:560px;}
.ph-stats{display:flex;gap:1.5rem;font-size:.85rem;color:#475569;}
.ph-stats b{font-family:'League Spartan',sans-serif;color:#0f172a;font-size:1rem;}
.follow-btn{background:#38bdf8;color:#fff;border:none;padding:.7rem 1.75rem;font-family:'Manrope',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;border-radius:12px;transition:all .2s;white-space:nowrap;}
.follow-btn:hover{background:#0ea5e9;}
.follow-btn.following{background:#f1f5f9;color:#475569;}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;margin:2.5rem 0 1.25rem;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.1rem;}
.pcard{background:#fff;border:1px solid #e2e8f0;transition:box-shadow .25s,border-color .25s,transform .25s;display:flex;flex-direction:column;cursor:pointer;border-radius:16px;overflow:hidden;}
.pcard:hover{box-shadow:0 10px 32px rgba(0,0,0,.12);border-color:#38bdf8;transform:translateY(-3px);}
.pc-img{aspect-ratio:1/1;width:100%;overflow:hidden;position:relative;background:#f0f9ff;}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.pcard:hover .pc-img img{transform:scale(1.06);}
.pc-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);}
.pc-placeholder svg{width:40px;height:40px;color:#94a3b8;}
.pc-body{padding:1rem;flex:1;display:flex;flex-direction:column;}
.pc-name{font-family:'League Spartan',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.5rem;line-height:1.25;}
.pc-price-row{display:flex;align-items:baseline;gap:.25rem;margin-bottom:.85rem;margin-top:auto;}
.pc-price{font-family:'League Spartan',sans-serif;font-size:1.35rem;font-weight:900;}
.pc-per{font-size:.7rem;color:#94a3b8;}
.pc-actions{display:flex;gap:.4rem;}
.pc-cart{flex:1;background:#38bdf8;color:#fff;border:none;padding:.55rem;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;transition:background .2s;border-radius:9px;}
.pc-cart:hover{background:#0ea5e9;}
.pc-view{background:transparent;color:#475569;border:1.5px solid #e2e8f0;padding:.55rem .65rem;font-size:.78rem;cursor:pointer;font-family:'Manrope',sans-serif;transition:all .2s;border-radius:9px;}
.pc-view:hover{border-color:#38bdf8;color:#38bdf8;}
.empty{text-align:center;padding:3rem;color:#64748b;grid-column:1/-1;}
</style>
</head>
<body>
<div id="navMount"></div>
<div class="cover"></div>
<div class="wrap">
  <div class="profile-head" id="profileHead">
    <div class="empty" style="padding:1rem;">Loading profile...</div>
  </div>
  <div class="section-title">Products</div>
  <div class="products-grid" id="productsGrid"><div class="empty">Loading...</div></div>
</div>

<script>
let profileId = null;
let currentUser = null;

async function init() {
  document.getElementById('navStyles').textContent = NAV_CSS;
  const params = new URLSearchParams(window.location.search);
  profileId = params.get('id');
  if (!profileId) { window.location.href = 'accounts.html'; return; }

  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  const myProfile = currentUser ? await getProfile(currentUser.id) : null;
  document.getElementById('navMount').innerHTML = buildNav(currentUser, myProfile);
  if (currentUser) updateCartCount();

  const { data: prof } = await sb.from('profiles')
    .select('id, full_name, display_name, account_description, photo_url, follower_count')
    .eq('id', profileId).single();

  if (!prof) { document.getElementById('profileHead').innerHTML = '<div class="empty" style="padding:1rem;">Profile not found</div>'; return; }

  const name = prof.display_name || prof.full_name || 'Seller';
  document.title = name + ' — Shiftable';

  const { data: products } = await sb.from('products')
    .select('*').eq('seller_id', profileId).eq('status','approved');
  const productCount = (products || []).length;

  const isMe = currentUser && currentUser.id === profileId;
  const following = await isFollowing(profileId);

  document.getElementById('profileHead').innerHTML = `
    <div class="ph-avatar" style="${prof.photo_url ? `background-image:url(${prof.photo_url})` : ''}">${prof.photo_url ? '' : name.charAt(0).toUpperCase()}</div>
    <div class="ph-info">
      <div class="ph-name">${name}</div>
      <div class="ph-desc">${prof.account_description || 'AI builder on Shiftable'}</div>
      <div class="ph-stats">
        <span><b id="followerCount">${prof.follower_count||0}</b> followers</span>
        <span><b>${productCount}</b> products</span>
      </div>
    </div>
    ${isMe
      ? `<a href="seller-dashboard.html" class="follow-btn" style="background:#f1f5f9;color:#475569;text-decoration:none;display:inline-block;">Edit Profile</a>`
      : `<button class="follow-btn ${following ? 'following' : ''}" id="followBtn" onclick="doFollow()">${following ? 'Following' : '+ Follow'}</button>`}
  `;

  const grid = document.getElementById('productsGrid');
  grid.innerHTML = productCount ? products.map(p => `
    <div class="pcard" onclick="window.location.href='product.html?id=${p.id}'">
      <div class="pc-img">
        ${p.photo_url ? `<img src="${p.photo_url}" alt="${p.name}" loading="lazy">` : `<div class="pc-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>`}
        ${(p.is_shiftable_verified || p.is_shiftable_original) ? `<span class="sv-badge" style="position:absolute;top:.6rem;left:.6rem;"><svg viewBox="0 0 24 24" fill="currentColor" width="10" height="10"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>Verified</span>` : ''}
      </div>
      <div class="pc-body">
        <div class="pc-name">${p.name}</div>
        <div class="pc-price-row"><span class="pc-price">$${p.price}</span><span class="pc-per">/${p.price_type}</span></div>
        <div class="pc-actions" onclick="event.stopPropagation()">
          <button class="pc-cart" onclick="addToCart('${p.id}')">Add to Cart</button>
          <button class="pc-view" onclick="window.location.href='product.html?id=${p.id}'">Details</button>
        </div>
      </div>
    </div>
  `).join('') : '<div class="empty">This seller has no products yet</div>';
}

async function doFollow() {
  const btn = document.getElementById('followBtn');
  const countEl = document.getElementById('followerCount');
  const nowFollowing = await toggleFollow(profileId);
  btn.textContent = nowFollowing ? 'Following' : '+ Follow';
  btn.classList.toggle('following', nowFollowing);
  countEl.textContent = parseInt(countEl.textContent) + (nowFollowing ? 1 : -1);
}

init();
</script>
</body>
</html>
