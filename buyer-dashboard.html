<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — Shiftable</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style id="navStyles"></style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;color:#0f172a;font-family:'Manrope',sans-serif;}
.layout{max-width:900px;margin:2rem auto;padding:0 2rem;}
.profile-card{background:#fff;border:1px solid #e2e8f0;padding:2rem;display:flex;gap:1.5rem;align-items:flex-start;margin-bottom:1.5rem;}
.profile-av{width:64px;height:64px;background:linear-gradient(135deg,#38bdf8,#0284c7);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'League Spartan',sans-serif;font-weight:800;font-size:1.5rem;color:#fff;flex-shrink:0;}
.profile-info h2{font-family:'League Spartan',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.2rem;}
.profile-info p{font-size:.85rem;color:#64748b;margin-bottom:.5rem;}
.profile-type{font-size:.68rem;color:#38bdf8;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;}
.table-card{background:#fff;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:1.5rem;}
.table-hdr{padding:1rem 1.25rem;border-bottom:1px solid #e2e8f0;}
.table-hdr h3{font-family:'League Spartan',sans-serif;font-size:.92rem;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{padding:.65rem 1.1rem;text-align:left;font-size:.65rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e2e8f0;background:#f8fafc;}
td{padding:.65rem 1.1rem;font-size:.82rem;border-bottom:1px solid #f1f5f9;color:#475569;}
tr:last-child td{border:none;}
.empty{padding:2rem;text-align:center;color:#64748b;font-size:.85rem;}
.seller-cta{background:#0f172a;padding:2rem;display:flex;justify-content:space-between;align-items:center;gap:1.5rem;margin-bottom:1.5rem;}
.seller-cta h3{font-family:'League Spartan',sans-serif;font-size:1rem;font-weight:800;color:#fff;margin-bottom:.25rem;}
.seller-cta p{font-size:.82rem;color:#94a3b8;}
.seller-cta-btn{background:#38bdf8;color:#fff;border:none;padding:.65rem 1.5rem;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;white-space:nowrap;text-decoration:none;display:inline-block;}
</style>
</head>
<body>
<div id="navMount"></div>
<div class="layout">
  <div class="profile-card">
    <div class="profile-av" id="profileAv">B</div>
    <div class="profile-info">
      <h2 id="profileName">Loading...</h2>
      <p id="profileEmail"></p>
      <div class="profile-type">Buyer Account</div>
    </div>
  </div>
  <div class="table-card">
    <div class="table-hdr"><h3>My Purchases</h3></div>
    <table><thead><tr><th>Product</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
    <tbody id="purchasesTable"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody></table>
  </div>
  <div class="seller-cta">
    <div>
      <h3>Want to sell on Shiftable?</h3>
      <p>List your AI products and reach thousands of businesses.</p>
    </div>
    <a href="auth.html?tab=signup&type=seller" class="seller-cta-btn">Become a Seller →</a>
  </div>
</div>
<script>
async function init() {
  document.getElementById('navStyles').textContent = NAV_CSS;
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'auth.html'; return; }
  const user = session.user;
  if (user.email === ADMIN_EMAIL) { window.location.href = 'owner-dashboard.html'; return; }
  const profile = await getProfile(user.id);
  if (profile && (profile.account_type === 'seller' || profile.account_type === 'both')) { window.location.href = 'seller-dashboard.html'; return; }
  document.getElementById('navMount').innerHTML = buildNav(user, profile);
  updateCartCount();
  const name = profile?.full_name || user.email.split('@')[0];
  document.getElementById('profileAv').textContent = name.charAt(0).toUpperCase();
  document.getElementById('profileName').textContent = name;
  document.getElementById('profileEmail').textContent = user.email;
  const { data: orders } = await sb.from('orders').select('*, products(name)').eq('buyer_id', user.id).order('created_at', { ascending: false });
  document.getElementById('purchasesTable').innerHTML = orders && orders.length ? orders.map(o => `
    <tr><td>${o.products?.name || '—'}</td><td>$${o.amount}</td><td>${new Date(o.created_at).toLocaleDateString()}</td><td><span style="color:#16a34a;font-size:.75rem;font-weight:600;">Active</span></td></tr>`).join('') : '<tr><td colspan="4" class="empty">No purchases yet. <a href="marketplace.html" style="color:#38bdf8;">Browse marketplace →</a></td></tr>';
}
init();
</script>
</body>
</html>
